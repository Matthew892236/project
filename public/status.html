<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gig Status</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background-color: #ffffff; color: #0f172a; padding: 40px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 440px; text-align: center; }
    h1 { font-size: 26px; font-weight: 800; color: #1e3a5f; margin: 0 0 12px 0; }
    p { color: #475569; font-size: 16px; line-height: 1.6; margin: 0 0 24px 0; }
    .footer-brand { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="status-title">Processing...</h1>
    <p id="status-message">Please wait a moment.</p>
    <div style="height: 1px; background-color: #e2e8f0; margin-bottom: 16px;"></div>
    <span class="footer-brand">Powered by Brassbandwidth</span>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get('action');

    if (action === 'accept') {
      document.getElementById('status-title').innerText = 'Thank You!';
      document.getElementById('status-title').style.color = '#16a34a';
      document.getElementById('status-message').innerText = 'Your confirmation has been saved. See you at the gig!';
    } else if (action === 'decline') {
      document.getElementById('status-title').innerText = 'No Problem!';
      document.getElementById('status-title').style.color = '#dc2626';
      document.getElementById('status-message').innerText = 'Thanks for letting us know. We will check with the next player.';
    } else if (action === 'filled') {
      document.getElementById('status-title').innerText = 'Position Filled';
      document.getElementById('status-title').style.color = '#eab308';
      document.getElementById('status-message').innerText = 'Thanks for your response! This vacancy has already been filled by another player.';
    } else {
      document.getElementById('status-title').innerText = 'Notice Received';
      document.getElementById('status-message').innerText = 'Your status has been updated.';
    }
  </script>
</body>
</html>
